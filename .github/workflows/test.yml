name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  # Set MATLAB batch licensing token for private repos or when using MATLAB Engine
  MLM_LICENSE_TOKEN: ${{ secrets.MATLAB_BATCH_TOKEN }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Fetch base branch
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"

      - name: Run pre-commit checks
        run: |
          ./pre-commit.py --changed-from "origin/${{ github.base_ref }}"

  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]
        python-version: ["3.10", "3.11", "3.12"]
        include:
          # Test on macOS and Windows for Python 3.12 only
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python ${{ matrix.python-version }}
        run: |
          uv python install ${{ matrix.python-version }}

      - name: Determine MATLAB availability
        id: matlab-availability
        shell: bash
        run: |
          # Skip MATLAB on macOS and Windows, only enable on Ubuntu if token available
          if [[ "${{ matrix.os }}" == "ubuntu-22.04" ]] && [[ -n "$MLM_LICENSE_TOKEN" ]]; then
            available=true
          else
            available=false
          fi
          echo "available=${available}" >> "$GITHUB_OUTPUT"
          echo "EEGPREP_SKIP_MATLAB=1" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          uv sync --python ${{ matrix.python-version }} --all-extras --group dev

      - name: Set up MATLAB
        if: steps.matlab-availability.outputs.available == 'true'
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2024b
          products: MATLAB

      - name: Locate MATLAB root
        if: steps.matlab-availability.outputs.available == 'true'
        shell: bash
        run: |
          MATLAB_ROOT=$(python - <<'PY'
          import os
          from pathlib import Path
          tool_cache = Path(os.environ.get("RUNNER_TOOL_CACHE", "")) / "MATLAB"
          candidates = sorted(tool_cache.glob("*/x64"))
          if not candidates:
              raise SystemExit(f"No MATLAB installation found under {tool_cache}")
          print(candidates[-1])
          PY
          )
          echo "MATLAB_ROOT=$MATLAB_ROOT" >> $GITHUB_ENV
          echo "$MATLAB_ROOT/bin" >> $GITHUB_PATH

      - name: Install Python MATLAB Engine
        if: steps.matlab-availability.outputs.available == 'true'
        shell: bash
        run: |
          uv pip install "${MATLAB_ROOT}/extern/engines/python"

      - name: Check MATLAB Engine availability
        if: steps.matlab-availability.outputs.available == 'true'
        shell: bash
        run: |
          if uv run --no-sync python - <<'PY'
          import matlab.engine
          eng = matlab.engine.start_matlab()
          eng.quit()
          PY
          then
            echo "EEGPREP_SKIP_MATLAB=0" >> "$GITHUB_ENV"
          else
            echo "EEGPREP_SKIP_MATLAB=1" >> "$GITHUB_ENV"
          fi

      - name: Run MATLAB tests
        if: steps.matlab-availability.outputs.available == 'true'
        uses: matlab-actions/run-command@v2
        with:
          command: "ver"

      - name: Run Python tests via MATLAB batch
        if: steps.matlab-availability.outputs.available == 'true'
        uses: matlab-actions/run-command@v2
        with:
          command: |
            [status, cmdout] = system('uv run --no-sync pytest tests');
            disp(cmdout);
            if status ~= 0
                error('Python tests failed');
            end

      - name: Run Python tests
        if: steps.matlab-availability.outputs.available != 'true'
        run: |
          uv run --no-sync pytest tests

      - name: Display installed packages
        if: always()
        run: |
          uv pip list
