[pytest]
addopts = -ra
testpaths = tests
markers =
    fast: fast-running parity or unit checks
    matlab: requires a live MATLAB oracle
    artifact: uses committed or cached artifact baselines
    visual: validates plots or figure outputs
    workflow: validates multi-step behavioral parity
    nightly: reserved for scheduled parity coverage
    release: reserved for release-gate parity coverage
    ui: reserved for future GUI parity tests
